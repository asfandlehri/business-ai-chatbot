<!DOCTYPE html>
<html>

<head>
    <title>IntelligentApps AI Agency</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>IntelligentApps</h1>
        <p>AI Chatbots • AI Agents • Automation Solutions</p>
        <p class="status">🟢 Online Now • Available For New Projects</p>
    </div>

    <div class="portfolio">

        <div class="card">
            🤖 Business AI Chatbot
        </div>

        <div class="card">
            🔐 Cyber Security Assistant
        </div>

        <div class="card">
            🌿 Herbs & Health AI
        </div>

        <div class="card">
            🌍 Nature Information Bot
        </div>

    </div>

    <div class="cta">
        <button class="hire-btn">
            🚀 Hire Me On Fiverr
        </button>
    </div>

    <div class="quick-buttons">
        <button onclick="quickReply('services')">🚀 Services</button>
        <button onclick="quickReply('pricing')">💰 Pricing</button>
        <button onclick="quickReply('chatbot')">🤖 Chatbots</button>
        <button onclick="quickReply('automation')">⚡ Automation</button>
        <button onclick="quickReply('contact')">📞 Contact</button>
    </div>

    <div id="chat-box">

        <div class="bot-message">
            <div class="bot-bubble">
                🤖 Welcome to IntelligentApps! Ask me about services, pricing, chatbots or automation.
            </div>
        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="user-input"
        placeholder="Type your message...">

        <button
        class="send-btn"
        onclick="sendMessage()">
        Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
