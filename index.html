<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelligentApps AI Agency</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">

        <h1>IntelligentApps</h1>

        <p>
            AI Chatbots • AI Agents • Automation Solutions
        </p>

        <div class="online-status">
            🟢 Online Now • Available For New Projects
        </div>

    </div>

    <div class="portfolio-section">

        <h2>💼 Previous AI Projects & Demos</h2>

        <p class="portfolio-text">
            Examples of AI solutions and chatbot projects I have built.
        </p>

        <div class="project-buttons">

            <button class="project-btn">
                🤖 Business AI Chatbot
                <span>Completed Project</span>
            </button>

            <button class="project-btn">
                🔐 Cyber Security Assistant
                <span>Completed Project</span>
            </button>

            <button class="project-btn">
                🌿 Herbs & Health AI
                <span>Completed Project</span>
            </button>

            <button class="project-btn">
                🌍 Nature Information Bot
                <span>Completed Project</span>
            </button>

        </div>

    </div>

    <div class="hire-section">

        <button class="hire-btn">
            🚀 Hire Me On Fiverr
        </button>

    </div>

    <div class="quick-buttons">

        <button onclick="quickReply('services')">
            🚀 Services
        </button>

        <button onclick="quickReply('pricing')">
            💰 Pricing
        </button>

        <button onclick="quickReply('chatbot')">
            🤖 Chatbots
        </button>

        <button onclick="quickReply('automation')">
            ⚡ Automation
        </button>

        <button onclick="quickReply('contact')">
            📞 Contact
        </button>

    </div>

    <div id="chat-box">

        <div class="bot-message">
            🤖 Welcome to IntelligentApps!
            Ask me about services, pricing,
            chatbots or automation.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="user-input"
            placeholder="Type your message..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
