<!DOCTYPE html>
<html>

<head>
    <title>IntelligentApps AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>IntelligentApps</h1>
        <p>AI Chatbots • AI Agents • Automation Solutions</p>
    </div>

    <div class="quick-buttons">
        <button onclick="quickReply('services')">🚀 Services</button>
        <button onclick="quickReply('pricing')">💰 Pricing</button>
        <button onclick="quickReply('chatbot')">🤖 Chatbots</button>
        <button onclick="quickReply('automation')">⚡ Automation</button>
        <button onclick="quickReply('contact')">📞 Contact</button>
    </div>

    <div id="chat-box">
        <p><b>AI Assistant:</b> Welcome to IntelligentApps! Ask me about services, pricing, chatbots or automation.</p>
    </div>

    <input type="text" id="user-input" placeholder="Type your message...">

    <button onclick="sendMessage()">Send</button>

</div>

<script src="script.js"></script>

</body>
</html>
